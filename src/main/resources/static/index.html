<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>CG 投影変換シミュレーター</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./common/css/common.css?v=@build.timestamp@">
  <link rel="icon" href="data:,">
</head>

<body>
  <h1>CG 投影変換シミュレーター</h1>
  <p>次元を選択してください。</p>

  <form id="dimensionForm">
    <label>
      <input type="radio" name="dimension" value="2D" checked> 2D
    </label>
    <label>
      <input type="radio" name="dimension" value="3D"> 3D
    </label>

    <hr>
    <div class="btn-group">
      <button type="button" id="nextBtn" class="btn-primary">次へ</button>
    </div>
  </form>

  <div
    style="margin-top: 24px; color: var(--color-text-muted); font-size: 0.9em; max-width: 680px; padding: 12px; background-color: #fff; border: 1px solid var(--color-border); border-radius: var(--radius-sm);">
    <p style="margin-bottom: 8px; color: var(--color-danger); font-weight: 600;">【推奨環境について】</p>
    <p style="margin-bottom: 4px;">※当シミュレーターは<b>PCでの動作を推奨</b>しております。</p>
    <p style="margin-bottom: 0;">※スマートフォンから開く場合は、必ず<b>Safariなどの検索エンジン（ブラウザ）</b>から開いてください。</p>
  </div>

  <script src="./common/js/index.js?v=@build.timestamp@" type="module"></script>
</body>

</html>
