<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>CG 投影変換シミュレーター (3D)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../common/css/common.css">
    <link rel="stylesheet" href="../css/confirm.css">
    <link rel="icon" href="data:,">
</head>

<body>
    <h1>3D 入力内容確認</h1>

    <section>
        <h3>図形情報</h3>
        <div id="shapeInfo"></div>
    </section>

    <hr>

    <section>
        <h3>変換行列</h3>
        <ul id="transformList"></ul>
    </section>

    <section>
        <h3>ああああ合成変換行列M (4×4)</h3>
        <div id="composedMatrix">計算中...</div>
    </section>

    <hr>

    <section>
        <h3>投影の設定</h3>

        <div class="radio-group">
            <label><input type="radio" name="projectionType" value="parallel" checked>平行投影</label>
            <label><input type="radio" name="projectionType" value="perspective">透視投影</label>
        </div>

        <label>投影面 Z =
            <input type="number" id="projectionZ" step="any" value="1">
        </label>

        <div id="perspectiveOptions" style="display:none; margin-top: 10px;">
            <p>※ 視点から投影面までの距離 d を指定してください（d &gt; 0）。<br>
                値が小さいほどパースが強くなります。</p>
            <label>視点距離 d =
                <input type="number" id="perspectiveD" step="any" value="5" min="0.01">
            </label>
        </div>
    </section>

    <hr>

    <div class="btn-group">
        <button type="button" id="sendBtn" class="btn-primary">描画</button>
        <button type="button" id="backBtn" class="btn-secondary">戻る</button>
    </div>

    <script src="../js/confirm.js" type="module"></script>
</body>

</html>
