<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>CG 投影変換シミュレーター (3D)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../common/css/common.css?v=@build.timestamp@">
    <link rel="stylesheet" href="../css/confirm.css?v=@build.timestamp@">
    <link rel="icon" href="data:,">
</head>

<body>
    <h1>3D 入力内容確認</h1>

    <section>
        <h3>図形情報</h3>
        <div id="shapeInfo"></div>
    </section>

    <hr>

    <section>
        <h3>変換行列</h3>
        <ul id="transformList"></ul>
    </section>

    <section>
        <h3>合成変換行列M (4×4)</h3>
        <div id="composedMatrix">計算中...</div>
    </section>

    <hr>

    <section>
        <h3>投影の設定</h3>

        <div class="radio-group">
            <label><input type="radio" name="projectionType" value="perspective" checked>透視投影</label>
            <label><input type="radio" name="projectionType" value="parallel">平行投影</label>
        </div>

        <label>投影面 Z =
            <input type="number" id="projectionZ" step="any" value="1">
        </label>

        <div id="perspectiveOptions" style="display:none; margin-top: 10px;">
            <button type="button" id="openSettingsBtn" class="btn-secondary" style="margin-top: 10px;">詳細設定</button>
            <p>※ 視点（カメラ）の位置や描画図形を指定できます。</p>
        </div>
    </section>

    <!-- 詳細設定 モーダルダイアログ -->
    <div id="settingsModal" class="modal-overlay" style="display: none;">
        <div class="modal-content settings-modal-content">
            <h4>透視投影 詳細設定</h4>
            <div class="settings-scroll-area">
                <section class="settings-section">
                    <h5>視点（カメラ）の設定</h5>

                    <div id="cameraCoordinates">
                        <p style="font-size: 0.85em; color: #555; margin-bottom: 15px;">
                            世界座標系におけるカメラ(視点)の座標を入力してください。<br>
                            ※投影面 Z = <span id="modalProjZDisplay"></span><br>
                            ※デフォルトは (0, 0, 0) です。
                        </p>
                        <div class="modal-input-group">
                            <label>視点 X = <input type="number" id="cameraX" step="any" value="0"></label>
                        </div>
                        <div class="modal-input-group">
                            <label>視点 Y = <input type="number" id="cameraY" step="any" value="0"></label>
                        </div>
                        <div class="modal-input-group">
                            <label>視点 Z = <input type="number" id="cameraZ" step="any" value="0"></label>
                        </div>
                    </div>
                </section>

                <section class="settings-section">
                    <h5>描画する図形</h5>
                    <div class="modal-input-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="drawBefore" checked> 変換前(3D)
                        </label>
                    </div>
                    <div class="modal-input-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="drawAfter3D" checked> 変換後(3D)
                        </label>
                    </div>
                    <div class="modal-input-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="drawAfter2D" checked> 透視投影結果(2D)
                        </label>
                    </div>
                </section>
            </div>
            <div class="modal-btn-group">
                <button type="button" id="saveSettingsBtn" class="btn-primary">決定</button>
                <button type="button" id="cancelSettingsBtn" class="btn-secondary">キャンセル</button>
            </div>
        </div>
    </div>

    <hr>

    <div class="btn-group">
        <button type="button" id="sendBtn" class="btn-primary">描画</button>
        <button type="button" id="backBtn" class="btn-secondary">戻る</button>
    </div>

    <script src="../js/confirm.js?v=@build.timestamp@" type="module"></script>
</body>

</html>
