<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>CG 投影変換シミュレーター (3D)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/common/css/common.css">
    <link rel="stylesheet" href="/3D/css/trans-matrix.css">
</head>

<body>
    <h1>3D 幾何変換行列入力</h1>
    <p>投影変換を選択してください。</p>

    <select id="transformType">
        <option value="">--- 選択してください ---</option>
        <option value="translation">平行移動</option>
        <option value="scale">拡大縮小</option>
        <option value="rotationX">X軸 回転(deg)</option>
        <option value="rotationY">Y軸 回転(deg)</option>
        <option value="rotationZ">Z軸 回転(deg)</option>
        <option value="custom">任意の変換行列 (4×4)</option>
    </select>

    <hr>

    <div id="translationMatrix" class="hidden">
        <label>tx：<input type="number" id="tx" step="any" value="0"></label>
        <label>ty：<input type="number" id="ty" step="any" value="0"></label>
        <label>tz：<input type="number" id="tz" step="any" value="0"></label>
    </div>

    <div id="scaleMatrix" class="hidden">
        <label>sx：<input type="number" id="sx" step="any" value="1"></label>
        <label>sy：<input type="number" id="sy" step="any" value="1"></label>
        <label>sz：<input type="number" id="sz" step="any" value="1"></label>
    </div>

    <div id="rotationXMatrix" class="hidden">
        <label>θx(deg)：<input type="number" id="thetaX" step="any" value="0"></label>
    </div>

    <div id="rotationYMatrix" class="hidden">
        <label>θy(deg)：<input type="number" id="thetaY" step="any" value="0"></label>
    </div>

    <div id="rotationZMatrix" class="hidden">
        <label>θz(deg)：<input type="number" id="thetaZ" step="any" value="0"></label>
    </div>

    <div id="customMatrix" class="hidden">
        <label>任意の 4×4 変換行列</label>
        <div class="matrix-grid-4">
            <input type="number" id="m00" step="any" value="1">
            <input type="number" id="m01" step="any" value="0">
            <input type="number" id="m02" step="any" value="0">
            <input type="number" id="m03" step="any" value="0">

            <input type="number" id="m10" step="any" value="0">
            <input type="number" id="m11" step="any" value="1">
            <input type="number" id="m12" step="any" value="0">
            <input type="number" id="m13" step="any" value="0">

            <input type="number" id="m20" step="any" value="0">
            <input type="number" id="m21" step="any" value="0">
            <input type="number" id="m22" step="any" value="1">
            <input type="number" id="m23" step="any" value="0">

            <input type="number" id="m30" step="any" value="0">
            <input type="number" id="m31" step="any" value="0">
            <input type="number" id="m32" step="any" value="0">
            <input type="number" id="m33" step="any" value="1">
        </div>
        <p>※ 同次座標行列（通常は最下行が 0 0 0 1）</p>
    </div>

    <hr>
    <div class="btn-group">
        <button type="button" id="addBtn" class="btn-accent">追加</button>
    </div>

    <ul id="transformList"></ul>

    <hr>
    <div class="btn-group">
        <button type="button" id="nextBtn" class="btn-primary">次へ</button>
        <button type="button" id="backBtn" class="btn-secondary">戻る</button>
    </div>

    <script src="/common/js/util.js" type="module"></script>
    <script src="/3D/js/trans-matrix.js" type="module"></script>
</body>

</html>
