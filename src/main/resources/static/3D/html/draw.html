<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>CG 投影変換シミュレーター (3D)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../common/css/common.css?v=@build.timestamp@">
    <link rel="stylesheet" href="../css/draw.css?v=@build.timestamp@">
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
    <link rel="icon" href="data:,">
</head>

<body>
    <div class="page-title">
        <h1>3D 描画結果</h1>
        <button class="help-btn" id="helpBtn" aria-label="このページの説明">?</button>
        <div class="help-popup" id="helpPopup">
            <p><strong>3D 描画結果</strong>ページです。</p>
            <p>変換前（元の3D図形）・変換後（3D）・投影結果（2D）の3つの図形を表示しています。</p>
            <p>図中のカメラマーク📷をクリックすると画像を保存できます。</p>
            <p>「はじめから」を押すと最初の選択画面に戻ります。</p>
        </div>
    </div>

    <div id="canvasContainer3D">
        <div class="canvas-wrapper" id="wrapperBefore">
            <h3>変換前</h3>
            <div id="plotBefore"></div>
        </div>
        <div class="canvas-wrapper" id="wrapperAfter3D">
            <h3>変換後</h3>
            <div id="plotAfter3D"></div>
        </div>
        <div class="canvas-wrapper" id="wrapperAfter2D">
            <h3><span id="projTypeText"></span>(Z=<span id="targetZText"></span>)</h3>
            <div id="plotAfter"></div>
        </div>
    </div>

    <hr>
    <div class="btn-group">
        <button type="button" id="backBtn" class="btn-secondary">戻る</button>
        <button type="button" id="resetBtn" class="btn-danger">はじめから</button>
    </div>

    <script src="../js/draw.js?v=@build.timestamp@" type="module"></script>
    <script src="../../common/js/help.js?v=@build.timestamp@"></script>
</body>

</html>
