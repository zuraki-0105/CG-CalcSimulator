<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>CG 投影変換シミュレーター (3D)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../common/css/common.css">
    <link rel="stylesheet" href="../css/draw.css">
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
    <link rel="icon" href="data:,">
</head>

<body>
    <h1>3D 描画結果</h1>

    <div id="canvasContainer3D">
        <div class="canvas-wrapper">
            <h3>変換前</h3>
            <div id="plotBefore" style="width: 500px; height: 500px;"></div>
        </div>
        <div class="canvas-wrapper">
            <h3>変換後 (<span id="projTypeText"></span>, Z=<span id="targetZText"></span>)</h3>
            <div id="plotAfter" style="width: 500px; height: 500px;"></div>
        </div>
    </div>

    <hr>
    <div class="btn-group">
        <button type="button" id="backBtn" class="btn-secondary">戻る</button>
        <button type="button" id="resetBtn" class="btn-danger">はじめから</button>
    </div>

    <script src="../js/draw.js" type="module"></script>
</body>

</html>
