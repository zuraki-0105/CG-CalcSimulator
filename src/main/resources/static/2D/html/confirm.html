<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>CG 投影変換シミュレーター</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../common/css/common.css?v=@build.timestamp@">
    <link rel="stylesheet" href="../css/confirm.css?v=@build.timestamp@">
    <link rel="icon" href="data:,">
</head>

<body>
    <div class="page-title">
        <h1>2D 入力内容確認</h1>
        <button class="help-btn" id="helpBtn" aria-label="このページの説明">?</button>
        <div class="help-popup" id="helpPopup">
            <p><strong>2D 入力内容確認</strong>ページです。</p>
            <p>これまでに入力した図形情報と変換行列の一覧、および合成変換行列を確認できます。</p>
            <p>内容を確認したら「描画」を押すと変換結果を描画します。修正する場合は「戻る」を押してください。</p>
        </div>
    </div>

    <section>
        <h3>図形情報</h3>
        <div id="shapeInfo"></div>
    </section>

    <hr>

    <section>
        <h3>変換行列</h3>
        <ul id="transformList"></ul>
    </section>

    <section>
        <h3>合成変換行列M</h3>
        <div id="composedMatrix">計算中...</div>
    </section>

    <hr>

    <div class="btn-group">
        <button type="button" id="sendBtn" class="btn-primary">描画</button>
        <button type="button" id="backBtn" class="btn-secondary">戻る</button>
    </div>

    <script src="../js/confirm.js?v=@build.timestamp@" type="module"></script>
    <script src="../../common/js/help.js?v=@build.timestamp@"></script>
</body>

</html>
