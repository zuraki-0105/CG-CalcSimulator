<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>CG 投影変換シミュレーター</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../common/css/common.css?v=@build.timestamp@">
    <link rel="stylesheet" href="../css/trans-matrix.css?v=@build.timestamp@">
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
    <link rel="icon" href="data:,">
</head>

<body>
    <h1>2D 幾何変換行列入力</h1>
    <p>投影変換を選択してください。</p>

    <select id="transformType">
        <option value="">--- 選択してください ---</option>
        <option value="translation">平行移動</option>
        <option value="scale">拡大縮小</option>
        <option value="rotation">回転(deg)</option>
        <option value="reflection">鏡映変換</option>
        <option value="custom">任意の変換行列</option>
    </select>

    <hr>

    <div id="translationMatrix" class="hidden">
        <label>tx：
            <input type="number" id="tx" step="any" value="0">
        </label>
        <label>ty：
            <input type="number" id="ty" step="any" value="0">
        </label>
    </div>

    <div id="scaleMatrix" class="hidden">
        <label>sx：
            <input type="number" id="sx" step="any" value="1">
        </label>
        <label>sy：
            <input type="number" id="sy" step="any" value="1">
        </label>
    </div>

    <div id="rotationMatrix" class="hidden">
        <label>θ(deg)：
            <input type="number" id="theta" step="any" value="0">
        </label>
    </div>

    <div id="customMatrix" class="hidden">
        <label>任意の 3×3 変換行列</label>
        <div class="matrix-grid">
            <input type="number" id="m00" step="any" value="1">
            <input type="number" id="m01" step="any" value="0">
            <input type="number" id="m02" step="any" value="0">

            <input type="number" id="m10" step="any" value="0">
            <input type="number" id="m11" step="any" value="1">
            <input type="number" id="m12" step="any" value="0">

            <input type="number" id="m20" step="any" value="0">
            <input type="number" id="m21" step="any" value="0">
            <input type="number" id="m22" step="any" value="1">
        </div>
        <p>※ 同次座標行列（通常は最下行が 0 0 1）</p>
    </div>

    <div id="reflectionMatrix" class="hidden">
        <label>ax + by + c = 0 の各係数を入力</label>
        <div style="display: flex; flex-direction: column; gap: 8px; margin-top: 8px;">
            <label>a：<input type="number" id="refA" step="any" value="1" style="width: 80px;"> (xの係数)</label>
            <label>b：<input type="number" id="refB" step="any" value="-1" style="width: 80px;"> (yの係数)</label>
            <label>c：<input type="number" id="refC" step="any" value="0" style="width: 80px;"> (定数)</label>
        </div>
        <div class="btn-group" style="margin-top: 10px;">
            <button type="button" id="previewReflectionBtn" class="btn-accent"
                style="width: auto; padding: 5px 15px;">プレビューを表示</button>
        </div>
    </div>

    <hr>

    <div class="btn-group">
        <button type="button" id="addBtn" class="btn-accent">追加</button>
    </div>

    <ul id="transformList"></ul>

    <hr>

    <div class="btn-group">
        <button type="button" id="nextBtn" class="btn-primary">次へ</button>
        <button type="button" id="backBtn" class="btn-secondary">戻る</button>
    </div>

    <!-- プレビュー用モーダル -->
    <div id="previewModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" id="closePreviewBtn">&times;</span>
            <h2 style="margin-top: 0;">鏡映変換プレビュー</h2>
            <div id="previewArea"></div>
            <p id="reflectionStepsText" style="text-align: center; margin-top: 10px; font-weight: bold;"></p>
        </div>
    </div>

    <script src="../../common/js/util.js?v=@build.timestamp@" type="module"></script>
    <script src="../js/trans-matrix.js?v=@build.timestamp@" type="module"></script>
</body>

</html>
