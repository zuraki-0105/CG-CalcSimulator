<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>CG 投影変換シミュレーター</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/common/css/common.css">
    <link rel="stylesheet" href="/2d/css/draw.css">
</head>

<body>
    <h1>2D 描画結果</h1>

    <div id="canvasContainer">
        <canvas id="drawCanvas" width="600" height="600"></canvas>
    </div>

    <div id="legend">
        <span class="legend-item">
            <span class="legend-color legend-original"></span> 変換前
        </span>
        <span class="legend-item">
            <span class="legend-color legend-transformed"></span> 変換後
        </span>
    </div>

    <hr>

    <div class="btn-group">
        <button type="button" id="backBtn">戻る</button>
        <button type="button" id="resetBtn">はじめから</button>
    </div>

    <script src="/2d/js/draw.js"></script>
</body>

</html>
